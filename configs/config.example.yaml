version: 1

credentials:
  default:
    username: admin
    password: ${DEVICE_PASSWORD}

  cisco:
    username: admin
    password: ${CISCO_PASSWORD}

  mikrotik:
    username: admin
    password: ${MIKROTIK_PASSWORD}

devices:
  - name: core-switch
    ip: 192.168.2.1
    port: 22
    vendor: cisco
    credential: cisco

  - name: edge-router
    ip: 192.168.2.2
    port: 22
    vendor: mikrotik
    credential: mikrotik

snmp:
  community: ${SNMP_COMMUNITY}
  timeout: 10

backup:
  directory: backup
  archive_path: ""
